name: Deploy web demo

# Build the Vite demo and publish it to GitHub Pages. Runs on pushes to the
# default branch, and can be triggered manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the GitHub Pages deployment actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      # Gate the deploy on a green build.
      - name: Typecheck, lint & test
        run: npm run check

      - name: Build the web demo
        run: npm run build:web

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Attempt to enable Pages automatically if it isn't already.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-web

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
