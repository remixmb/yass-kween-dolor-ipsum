name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Least-privilege token: CI only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  build:
    name: Build artifacts
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - name: Build library + CLI
        run: npm run build
      - name: Build web demo
        run: npm run build:web
      # Upload the built demo so it can be downloaded and previewed from the
      # run summary (handy for reviewing PRs before they reach the live site).
      - name: Upload web demo preview
        uses: actions/upload-artifact@v7
        with:
          name: web-demo-${{ github.sha }}
          path: dist-web
          if-no-files-found: error
