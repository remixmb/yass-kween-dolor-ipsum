<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Lorem & Ipsum — a themed placeholder-text generator built on the genuine Latin origins of lorem ipsum. Blend Cicero with two dozen voices."
    />
    <!-- stable marker for the deploy smoke test -->
    <meta name="generator" content="yass-kween-dolor-ipsum" />
    <meta name="theme-color" content="#14141b" />
    <title>Lorem &amp; Ipsum — themed placeholder text 📜</title>

    <!-- Open Graph / Twitter: polished link previews when shared -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Lorem & Ipsum — a field guide to placeholder text"
    />
    <meta
      property="og:description"
      content="A themed lorem-ipsum generator built on the genuine Latin origins of lorem ipsum. Blend Cicero with two dozen voices, then copy or export."
    />
    <meta
      property="og:url"
      content="https://remixmb.github.io/yass-kween-dolor-ipsum/"
    />
    <meta
      property="og:image"
      content="https://raw.githubusercontent.com/remixmb/yass-kween-dolor-ipsum/main/assets/social-preview.png"
    />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="640" />
    <meta
      property="og:image:alt"
      content="The Lorem & Ipsum web app: the wordmark, a note on the Latin origins of lorem ipsum, and a row of voice chips."
    />
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="Lorem & Ipsum — a field guide to placeholder text"
    />
    <meta
      name="twitter:description"
      content="A themed lorem-ipsum generator built on the real Latin origins of lorem ipsum. Two dozen voices, a blend dial, copy & export."
    />
    <meta
      name="twitter:image"
      content="https://raw.githubusercontent.com/remixmb/yass-kween-dolor-ipsum/main/assets/social-preview.png"
    />

    <!-- Canonical + structured data for search & answer engines (SEO / AEO) -->
    <link rel="canonical" href="https://remixmb.github.io/yass-kween-dolor-ipsum/" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Lorem & Ipsum",
        "alternateName": "yass-kween-dolor-ipsum",
        "description": "A free, themed lorem ipsum and placeholder-text generator built on the genuine Latin origins of lorem ipsum. Generate dummy text in two dozen voices, blend from raw Cicero Latin to a styled voice, then copy or export as text, HTML, or JSON. Works offline.",
        "url": "https://remixmb.github.io/yass-kween-dolor-ipsum/",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Any (web browser)",
        "browserRequirements": "Requires JavaScript",
        "softwareVersion": "1.0",
        "isAccessibleForFree": true,
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "author": { "@type": "Person", "name": "Remi M." },
        "license": "https://opensource.org/licenses/MIT",
        "featureList": [
          "Two dozen themed placeholder-text voices",
          "Blend dial from authentic Cicero Latin to a styled voice",
          "Deterministic, seeded, reproducible output",
          "Copy or export as .txt and .json",
          "Installable PWA that works offline"
        ]
      }
    </script>

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='84'>📜</text></svg>"
    />

    <!-- Installable PWA: works offline and pins to the home screen / desktop -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Lorem & Ipsum" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Fonts are self-hosted (bundled via @fontsource in web/fonts.ts), not
         loaded from Google Fonts — no third-party request, so iOS privacy
         protections don't flag the page on load. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
